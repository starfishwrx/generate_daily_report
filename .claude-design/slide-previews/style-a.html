<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Style A - Notebook Tabs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,600;6..96,700&family=DM+Sans:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #262626; }
    body { display: grid; place-items: center; font-family: "DM Sans", "Noto Sans SC", sans-serif; }
    .slide {
      width: min(92vw, 1320px);
      height: min(88vh, 820px);
      position: relative;
      border-radius: 2rem;
      background: linear-gradient(180deg, #fbf7ef 0%, #f2ece1 100%);
      box-shadow: 0 30px 90px rgba(0,0,0,.38);
      overflow: hidden;
      padding: clamp(2rem, 4vw, 4rem);
    }
    .holes {
      position: absolute; inset: 0 auto 0 1.2rem; width: 1rem; display: flex; flex-direction: column;
      justify-content: space-evenly;
    }
    .holes span { width: .9rem; height: .9rem; border-radius: 999px; background: #d8cfbf; box-shadow: inset 0 1px 2px rgba(0,0,0,.15); }
    .tabs {
      position: absolute; inset: 8% 0 auto auto; display: grid; gap: .8rem;
    }
    .tabs span {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      padding: 1rem .6rem;
      border-radius: .9rem 0 0 .9rem;
      font-size: clamp(.6rem, 1vh, .8rem);
      letter-spacing: .18em;
      color: #1c1c1c;
      font-weight: 700;
    }
    .tabs span:nth-child(1) { background: #a3d8bf; }
    .tabs span:nth-child(2) { background: #d6c3f4; }
    .tabs span:nth-child(3) { background: #f4c4d0; }
    .eyebrow {
      color: #7a6b58;
      letter-spacing: .32em;
      text-transform: uppercase;
      font-size: clamp(.7rem, 1vw, .95rem);
      margin-left: 2rem;
      margin-top: .6rem;
    }
    h1 {
      font-family: "Bodoni Moda", serif;
      font-size: clamp(3rem, 7vw, 6.2rem);
      line-height: .95;
      color: #191714;
      max-width: 9ch;
      margin: clamp(1.8rem, 3vw, 3rem) 0 0 2rem;
    }
    p {
      max-width: 36rem;
      margin: 1.5rem 0 0 2rem;
      color: #584e42;
      font-size: clamp(1rem, 1.5vw, 1.28rem);
      line-height: 1.55;
    }
    .meta {
      position: absolute;
      left: clamp(2rem, 4vw, 4rem);
      bottom: clamp(2rem, 4vw, 3.2rem);
      right: clamp(5rem, 8vw, 9rem);
      display: flex;
      justify-content: space-between;
      color: #6a6257;
      font-size: clamp(.9rem, 1vw, 1rem);
      letter-spacing: .08em;
    }
  </style>
</head>
<body>
  <section class="slide">
    <div class="holes"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="tabs"><span>WORK</span><span>RESULT</span><span>PLAN</span></div>
    <div class="eyebrow">Style A / Notebook Tabs</div>
    <h1>把答辩做成一份更像内部申报材料的展示。</h1>
    <p>纸张感、分区感和留白会更强，适合“工作介绍 / 工作成果 / 规划展望”这种节奏。</p>
    <div class="meta">
      <span>4399 职级申报答辩</span>
      <span>Editorial / Light</span>
    </div>
  </section>
</body>
</html>
